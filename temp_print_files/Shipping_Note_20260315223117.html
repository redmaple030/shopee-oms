<!DOCTYPE html><html>
    <head><meta charset="UTF-8"><style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        @page { size: 100mm 150mm; margin: 0; }
        body { font-family: "微軟正黑體", sans-serif; margin: 0; padding: 0; background: #f0f0f0; font-size: 10px; }
        .page { width: 100mm; height: 150mm; padding: 8mm; 
                background: white; margin: 10px auto; display: flex; flex-direction: column; 
                page-break-after: always; overflow: hidden; }
        @media print { body { background: none; } .page { margin: 0; border: none; } }
        .header { border-bottom: 1.5px solid #000; padding-bottom: 3px; margin-bottom: 8px; }
        .info { width: 100%; margin-bottom: 8px; font-size: 10px; }
        .item-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .item-table th, .item-table td { border: 1px solid #000; font-size: 10px; padding: 4px 2px; }
        .item-table th { background-color: #eee !important; }
        .summary-box { border: 1.5px solid #000; margin-top: 5px; }
        .sum-row { display: flex; border-bottom: 1px solid #000; }
        .sum-item { flex: 1; padding: 4px; border-right: 1px solid #000; }
        .sum-item:last-child { border-right: none; }
        .label { font-size: 9px; display: block; font-weight: bold; }
        .val { font-size: 10px; font-weight: bold; }
        .page-footer { margin-top: auto; text-align: center; font-size: 9px; padding-top: 5px; }
    </style></head>
    <body onload="window.print()">
        <div class="page">
            <div class="header">
                <!-- 顯示自定義店名 -->
                <div style="font-size: 14px; font-weight: bold; text-align: center;"></div>
                <h3 style="margin:2px 0; font-size: 11px; text-align: center; color: #555;">出貨明細 (Label)</h3>
                <div style="text-align:right; font-size: 9px;">頁次：1 / 1</div>
            </div>

            <table class="info">
                <tr><td><b>買家：</b>一般零售</td><td style="text-align:right;">2026-03-15</td></tr>
                <tr><td><b>物流：</b></td><td style="text-align:right;">ID: 20260315223117</td></tr>
            </table>
            <table class="item-table">
                <thead><tr><th width="20%">商品編號</th><th width="50%">商品名稱</th><th width="10%">數量</th><th width="20%">單價</th></tr></thead>
                <tbody><tr style="height: 1.0cm;">
                <td style="text-align:center;">--</td>
                <td style="padding-left: 8px;">am5 防彎扣具 cpu蓋板</td>
                <td style="text-align:center;">1</td>
                <td style="text-align:right; padding-right: 8px;">$0</td>
            </tr></tbody>
            </table>
            <div class="summary-box">
                <div class="sum-row">
                    <div class="sum-item"><span class="label">物流運費 (買家付)</span><span class="val">$0</span></div>
                    <div class="sum-item"><span class="label">優惠折抵</span><span class="val">-$0</span></div>
                </div>
                <div class="sum-row" style="border-bottom:none; background:#eee !important;">
                    <div class="sum-item"><span class="label">商品總額</span><span class="val">$0</span></div>
                    <div class="sum-item" style="background:#ddd !important;">
                        <span class="label">買家應付總額</span><span class="val" style="font-size: 14px;">$0</span>
                    </div>
                </div>
            </div>
            <div class="page-footer">-- 感謝您的購買！請錄影拆封保障權益 --</div>
        </div></body></html>
